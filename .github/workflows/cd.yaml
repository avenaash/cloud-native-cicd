name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: master
        token: ${{ secrets.GITHUB_TOKEN }} # Ensures we have write access if permissions are set

    - name: Update Kubernetes manifests
      run: |
        # Try to replace placeholder OR update existing tag
        # This handles both cases: fresh repo vs already configured repo
        sed -i "s|avenaash/fastapi-app:.*|avenaash/fastapi-app:${{ github.event.workflow_run.head_sha }}|g" ./k8-manifests/deployment.yaml
        
        echo "Current image tag:"
        grep "image:" ./k8-manifests/deployment.yaml

    - name: Commit and push changes
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        
        # Only commit if there are actual changes
        if ! git diff --quiet k8-manifests/deployment.yaml; then
          git add k8-manifests/deployment.yaml
          git commit -m "ci: update image tag to ${{ github.event.workflow_run.head_sha }}"
          git push origin master
        else
          echo "No changes detected in deployment.yaml. Skipping commit."
        fi
