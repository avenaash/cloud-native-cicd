name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Update Kubernetes manifests
      run: |
        # Ensure the directory exists before running sed
        if [ -d "k8s-manifests" ]; then
          sed -i "s|YOUR_DOCKERHUB_USERNAME/fastapi-app:latest|${{ secrets.DOCKERHUB_USERNAME }}/fastapi-app:${{ github.event.workflow_run.head_sha }}|g" k8s-manifests/deployment.yaml
          echo "Manifest updated successfully."
        else
          echo "Error: k8s-manifests directory not found!"
          ls -la
          exit 1
        fi
    - name: Commit and push changes
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        git add k8s-manifests/deployment.yaml
        git commit -m "Update image tag to ${{ github.event.workflow_run.head_sha }}" || echo "No changes to commit"
        git push

    - name: Notify Argo CD
      run: |
        echo "Argo CD will automatically detect changes and sync"
