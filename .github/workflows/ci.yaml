name: CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        # Removed 'cd fastapi-app' - installing from root
        pip install -r requirements.txt

    - name: Run tests
      run: |
        # Removed 'cd fastapi-app' - running tests from root
        python -m pytest tests/ -v --tb=short

    - name: Lint code
      run: |
        # Removed 'cd fastapi-app' - linting from root
        pip install flake8
        # Changed 'app/' to '.' since main.py is in root
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  build:
    needs: test
    runs-on: ubuntu-latest
    # FIXED: Changed 'main' to 'master' to match your branch name
    if: github.ref == 'refs/heads/master' 
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        # FIXED: Changed context to '.' (current directory)
        context: . 
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-app:${{ github.sha }}
          ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-app:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
